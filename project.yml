name: AirBridge
options:
  bundleIdPrefix: com.gsmlg
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

packages:
  Hummingbird:
    url: https://github.com/hummingbird-project/hummingbird.git
    from: "2.0.0"
  MultipartKit:
    url: https://github.com/vapor/multipart-kit.git
    from: "4.7.0"
  SRP:
    url: https://github.com/adam-fowler/swift-srp.git
    from: "2.2.0"

targets:
  AirBridge:
    type: application
    platform: macOS
    sources:
      - Sources/AirBridge
    resources:
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gsmlg.airbridge
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: AirBridge.entitlements
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: false
        ENABLE_HARDENED_RUNTIME: true
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: Hummingbird
        product: Hummingbird
      - package: MultipartKit
      - package: SRP

  AirBridgeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/AirBridgeTests
    dependencies:
      - target: AirBridge
      - package: Hummingbird
        product: HummingbirdTesting
